spring.application.name=stay-booking
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stay_booking}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:stay_booking}
spring.datasource.password=${DB_PASSWORD:stay_booking}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.jackson.time-zone=Asia/Seoul

server.shutdown=graceful

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.org.hibernate.SQL=warn

app.time-zone=Asia/Seoul
