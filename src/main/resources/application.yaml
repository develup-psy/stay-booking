spring:
  application:
    name: stay-booking
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stay_booking}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:stay_booking}
    password: ${DB_PASSWORD:stay_booking}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  jackson:
    time-zone: Asia/Seoul

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: warn

app:
  time-zone: Asia/Seoul

checkout:
  token:
    secret: stay-booking-checkout-token-secret-key-2026-seoul
    ttl-seconds: 180

booking:
  stock:
    path: redis

payment:
  api:
    base-url: ${PAYMENT_API_BASE_URL:http://localhost:8082}
