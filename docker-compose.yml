services:
  mysql:
    image: mysql:8.4
    container_name: stay-booking-mysql
    environment:
      MYSQL_DATABASE: stay_booking
      MYSQL_USER: stay_booking
      MYSQL_PASSWORD: stay_booking
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: stay-booking-redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-fake:
    image: psy99/stay-booking-pg-fake:latest
    container_name: stay-booking-pg-fake
    platform: linux/amd64
    ports:
      - "8081:8081"

  stay-booking:
    build:
      context: .
      dockerfile: Dockerfile
    image: stay-booking-app:latest
    container_name: stay-booking-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-fake:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: stay_booking
      DB_USERNAME: stay_booking
      DB_PASSWORD: stay_booking
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PAYMENT_API_BASE_URL: http://payment-fake:8081
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  redis-data:
